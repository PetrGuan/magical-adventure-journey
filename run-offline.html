<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神奇的探险之旅（离线启动）</title>
  <link rel="stylesheet" href="src/ui/styles.css">
</head>
<body>
  <div id="app">

    <div id="loading-screen" class="screen">
      <div class="title-block">
        <h1 class="title">神奇的探险之旅</h1>
        <p class="hero-subtitle">一次真正的冒险，从这里开始</p>
      </div>

      <div class="progress-container">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="progress-text">正在加载……</div>
      </div>

      <button id="enter-button" class="enter-button" disabled>进入营地</button>

      <div class="footer-hint">
        简化离线模式（完整画面请双击 start.bat 或 start.command）
      </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="hud" class="hud hidden">
      <div class="hud-hint">
        <span class="hud-key">🖱️ 拖动鼠标</span> 转视角看四周 &nbsp;·&nbsp;
        <span class="hud-key">点击</span> 角色或画框互动
      </div>
    </div>

  </div>

  <script src="dist/bundle.js"></script>
</body>
</html>
